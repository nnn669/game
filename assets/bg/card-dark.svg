<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" fill="none">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glare" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="160" rx="16" fill="url(#cardBg)"/>
  <!-- Ambient glows -->
  <rect width="400" height="160" rx="16" fill="url(#glow1)"/>
  <rect width="400" height="160" rx="16" fill="url(#glow2)"/>
  <!-- Top glare highlight -->
  <rect width="400" height="70" rx="16" fill="url(#glare)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="400" y2="40" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="80" x2="400" y2="80" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="100" y1="0" x2="100" y2="160" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="200" y1="0" x2="200" y2="160" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="300" y1="0" x2="300" y2="160" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <!-- Border -->
  <rect width="400" height="160" rx="16" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.08"/>
</svg>
