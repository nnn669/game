<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 180" fill="none">
  <defs>
    <linearGradient id="hBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1d3d"/>
      <stop offset="50%" stop-color="#0f2a52"/>
      <stop offset="100%" stop-color="#0a1f42"/>
    </linearGradient>
    <linearGradient id="hGlare" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hOrb" cx="85%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hOrb2" cx="10%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <filter id="hglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="390" height="180" rx="20" fill="url(#hBg)"/>
  <rect width="390" height="180" rx="20" fill="url(#hOrb)"/>
  <rect width="390" height="180" rx="20" fill="url(#hOrb2)"/>
  <rect width="390" height="90" rx="20" fill="url(#hGlare)"/>
  <!-- Grid lines -->
  <line x1="0" y1="45" x2="390" y2="45" stroke="#fff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="90" x2="390" y2="90" stroke="#fff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="135" x2="390" y2="135" stroke="#fff" stroke-width="0.3" opacity="0.05"/>
  <line x1="78" y1="0" x2="78" y2="180" stroke="#fff" stroke-width="0.3" opacity="0.05"/>
  <line x1="156" y1="0" x2="156" y2="180" stroke="#fff" stroke-width="0.3" opacity="0.05"/>
  <line x1="234" y1="0" x2="234" y2="180" stroke="#fff" stroke-width="0.3" opacity="0.05"/>
  <line x1="312" y1="0" x2="312" y2="180" stroke="#fff" stroke-width="0.3" opacity="0.05"/>
  <!-- Chart line area fill -->
  <polygon points="20,160 60,140 100,148 150,118 200,124 250,96 300,106 355,80 390,86 390,175 20,175" fill="#1d4ed8" fill-opacity="0.08"/>
  <!-- Chart line -->
  <polyline points="20,160 60,140 100,148 150,118 200,124 250,96 300,106 355,80 390,86" stroke="#3b82f6" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#hglow)"/>
  <!-- Live dot -->
  <circle cx="390" cy="86" r="4" fill="#3b82f6" opacity="0.4"/>
  <circle cx="390" cy="86" r="2.5" fill="#60a5fa"/>
  <!-- Axis ticks -->
  <line x1="20" y1="166" x2="390" y2="166" stroke="#334155" stroke-width="0.6"/>
  <!-- Decorative corner element -->
  <rect x="345" y="14" width="32" height="32" rx="8" fill="#1d4ed8" fill-opacity="0.25" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <polyline points="351,30 356,25 361,28 366,22 371,25" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Border -->
  <rect width="390" height="180" rx="20" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.07"/>
</svg>
