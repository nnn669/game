<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <defs>
    <linearGradient id="emptyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Chart frame -->
  <rect x="30" y="20" width="140" height="100" rx="10" fill="url(#emptyBg)" stroke="#334155" stroke-width="1"/>
  <!-- Y axis -->
  <line x1="50" y1="30" x2="50" y2="105" stroke="#334155" stroke-width="1" stroke-linecap="round"/>
  <!-- X axis -->
  <line x1="50" y1="105" x2="160" y2="105" stroke="#334155" stroke-width="1" stroke-linecap="round"/>
  <!-- Y ticks -->
  <line x1="46" y1="50" x2="50" y2="50" stroke="#334155" stroke-width="0.8"/>
  <line x1="46" y1="70" x2="50" y2="70" stroke="#334155" stroke-width="0.8"/>
  <line x1="46" y1="90" x2="50" y2="90" stroke="#334155" stroke-width="0.8"/>
  <!-- Empty chart hint line - flat dashed -->
  <line x1="55" y1="78" x2="155" y2="78" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- Question mark -->
  <text x="100" y="75" text-anchor="middle" font-size="28" fill="#334155" font-family="-apple-system,sans-serif" font-weight="800">?</text>
  <!-- Bottom text -->
  <text x="100" y="138" text-anchor="middle" font-size="11" fill="#475569" font-family="-apple-system,sans-serif" font-weight="600">暂无数据</text>
  <text x="100" y="152" text-anchor="middle" font-size="9" fill="#334155" font-family="-apple-system,sans-serif">选择股票开始交易</text>
</svg>
