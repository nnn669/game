<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="spinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Track -->
  <circle cx="20" cy="20" r="16" stroke="#1e293b" stroke-width="3" fill="none"/>
  <!-- Arc -->
  <path d="M20 4 A16 16 0 0 1 36 20" stroke="url(#spinGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="3" fill="#334155"/>
  <circle cx="20" cy="20" r="1.5" fill="#60a5fa"/>
  <animateTransform
    attributeName="transform"
    type="rotate"
    from="0 20 20"
    to="360 20 20"
    dur="0.9s"
    repeatCount="indefinite"/>
</svg>
