<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="btcBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c0a00"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <linearGradient id="btcGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="btcGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="24" cy="24" r="22" fill="url(#btcBg)"/>
  <circle cx="24" cy="24" r="21" fill="none" stroke="#92400e" stroke-width="0.8"/>
  <!-- BTC symbol -->
  <!-- Vertical stem -->
  <line x1="24" y1="13" x2="24" y2="35" stroke="url(#btcGold)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Top serifs -->
  <line x1="22" y1="13" x2="26" y2="13" stroke="url(#btcGold)" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="35" x2="26" y2="35" stroke="url(#btcGold)" stroke-width="2" stroke-linecap="round"/>
  <!-- Upper bump -->
  <path d="M24 14 L29 16 Q32 19 29 22 L24 22" fill="none" stroke="url(#btcGold)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lower bump (wider) -->
  <path d="M24 22 L30 24 Q33 27 30 30 L24 30" fill="none" stroke="url(#btcGold)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow effect -->
  <path d="M24 14 L29 16 Q32 19 29 22 L24 22 L30 24 Q33 27 30 30 L24 30" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.5" filter="url(#btcGlow)"/>
</svg>
