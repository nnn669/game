<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="netBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#2d0f5e"/>
    </linearGradient>
    <radialGradient id="netGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="24" cy="24" r="22" fill="url(#netBg)"/>
  <circle cx="24" cy="24" r="22" fill="url(#netGlow)"/>
  <circle cx="24" cy="24" r="21" fill="none" stroke="#4c1d95" stroke-width="0.8"/>
  <!-- Globe outline -->
  <circle cx="24" cy="24" r="12" fill="none" stroke="#7c3aed" stroke-width="1.2"/>
  <!-- Latitude lines -->
  <ellipse cx="24" cy="24" rx="12" ry="5" fill="none" stroke="#7c3aed" stroke-width="0.7" opacity="0.6"/>
  <ellipse cx="24" cy="19" rx="9" ry="3" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="24" cy="29" rx="9" ry="3" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <!-- Longitude line (center) -->
  <line x1="24" y1="12" x2="24" y2="36" stroke="#7c3aed" stroke-width="0.7" opacity="0.6"/>
  <!-- Network nodes -->
  <circle cx="24" cy="24" r="2.5" fill="#a78bfa"/>
  <circle cx="15" cy="20" r="1.5" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="33" cy="20" r="1.5" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="18" cy="31" r="1.5" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="31" cy="30" r="1.5" fill="#c4b5fd" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="24" y1="24" x2="15" y2="20" stroke="#a78bfa" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="24" x2="33" y2="20" stroke="#a78bfa" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="24" x2="18" y2="31" stroke="#a78bfa" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="24" x2="31" y2="30" stroke="#a78bfa" stroke-width="0.8" opacity="0.6"/>
</svg>
