<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="url(#logoGrad)"/>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="21" fill="none" stroke="#1d4ed8" stroke-width="0.5" opacity="0.5"/>
  <!-- Chart shape - stylized rising bars -->
  <rect x="10" y="30" width="5" height="8" rx="1.5" fill="url(#goldGrad)" opacity="0.7"/>
  <rect x="17" y="24" width="5" height="14" rx="1.5" fill="url(#goldGrad)" opacity="0.85"/>
  <rect x="24" y="18" width="5" height="20" rx="1.5" fill="url(#goldGrad)"/>
  <rect x="31" y="22" width="5" height="16" rx="1.5" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- Gold line overlay -->
  <polyline points="12.5,26 19.5,20 26.5,15 33.5,18" stroke="#fde68a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Glow dot -->
  <circle cx="33.5" cy="18" r="2.5" fill="#fbbf24" filter="url(#glow)"/>
  <!-- Bottom line -->
  <line x1="8" y1="39" x2="40" y2="39" stroke="#334155" stroke-width="0.8"/>
</svg>
