<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="tBuy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="tSell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Buy arrow up-right -->
  <path d="M5 22 L13 10" stroke="url(#tBuy)" stroke-width="2" stroke-linecap="round"/>
  <path d="M8 10 L13 10 L13 15" stroke="url(#tBuy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sell arrow down-right -->
  <path d="M19 10 L27 22" stroke="url(#tSell)" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 22 L27 22 L27 17" stroke="url(#tSell)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center divider -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#334155" stroke-width="0.8" stroke-dasharray="2 2"/>
  <!-- Dot at cross -->
  <circle cx="16" cy="16" r="2.5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <circle cx="16" cy="16" r="1" fill="#94a3b8"/>
</svg>
