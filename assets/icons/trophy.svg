  <path d="M20 7 Q24 7 24 11 Q24 14 20 14" stroke="url(#tg)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Stem -->
  <rect x="12.5" y="21" width="3" height="3" fill="url(#tg)"/>
  <!-- Base -->
  <rect x="8.5" y="24" width="11" height="2.5" rx="1.2" fill="url(#tg)"/>
  <!-- Star glow inside -->
  <polygon points="14,8 14.8,10.5 17.5,10.5 15.3,12.2 16.1,14.7 14,13 11.9,14.7 12.7,12.2 10.5,10.5 13.2,10.5" fill="#fff7ed" opacity="0.85" filter="url(#tglow)" transform="scale(0.8) translate(3.5,1)"/>
</svg>
